name: Build and test
on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --deny warnings

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  linting:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Lint (clippy)
        run: cargo clippy --all-features --all-targets -- --deny warnings

  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        include:
          - os: ubuntu-latest
            rust: nightly
          - os: ubuntu-latest
            rust: 1.85.0  # MSRV
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: actions-rs/install@v0.1
        with:
          crate: cargo-all-features
          version: latest
          use-tool-cache: true
      - name: Build
        run: cargo build-all-features
      - name: Test
        run: cargo test-all-features

      - name: Upload debug artifacts
        if: matrix.rust == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.os }}
          path: |
            target/debug/udp2tcp
            target/debug/udp2tcp.exe
            target/debug/tcp2udp
            target/debug/tcp2udp.exe
          if-no-files-found: ignore
          retention-days: 7

  publish:
    name: Release · ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [formatting, linting, build-and-test]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - os: ubuntu-latest
            target: arm-unknown-linux-musleabihf
            cross: true
          - os: ubuntu-latest
            target: mipsel-unknown-linux-musl
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries
        shell: bash
        run: |
          if ${{ matrix.cross }}; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binaries
        id: package
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          TAG="${{ github.ref_name }}"

          if [[ "$TARGET" == *"windows"* ]]; then
            ARCHIVE="udp-over-tcp-${TAG}-${TARGET}.zip"
            7z a "$ARCHIVE" \
              "target/${TARGET}/release/udp2tcp.exe" \
              "target/${TARGET}/release/tcp2udp.exe"
          else
            strip "target/${TARGET}/release/udp2tcp" || true
            strip "target/${TARGET}/release/tcp2udp" || true
            ARCHIVE="udp-over-tcp-${TAG}-${TARGET}.tar.gz"
            tar czf "$ARCHIVE" \
              -C "target/${TARGET}/release" \
              udp2tcp tcp2udp
          fi

          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256" 2>/dev/null || \
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 30

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true

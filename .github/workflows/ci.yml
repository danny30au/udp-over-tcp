name: Build and publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BIN_FEATURES: clap,env_logger

jobs:
  publish:
    name: Release · ${{ matrix.target }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── OpenWrt x86_64 — primary target ───────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: false
            openwrt: true

          # ── Standard Linux ─────────────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            openwrt: false

          # ── macOS ──────────────────────────────────────────────────────────
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
            openwrt: false

          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            openwrt: false

          # ── Windows ────────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            openwrt: false

          # ── OpenWrt embedded (cross-compiled) ──────────────────────────────
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
            openwrt: true

          - os: ubuntu-latest
            target: arm-unknown-linux-musleabihf
            cross: true
            openwrt: true

          - os: ubuntu-latest
            target: mipsel-unknown-linux-musl
            cross: true
            openwrt: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools musl-dev

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binaries
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          RUSTFLAGS: ${{ matrix.target == 'x86_64-unknown-linux-musl' && '-C target-feature=+crt-static' || '' }}
        run: |
          if ${{ matrix.cross }}; then
            cross build --release \
              --target ${{ matrix.target }} \
              --features ${{ env.BIN_FEATURES }}
          else
            cargo build --release \
              --target ${{ matrix.target }} \
              --features ${{ env.BIN_FEATURES }}
          fi

      - name: Verify static binary
        if: matrix.openwrt && runner.os == 'Linux'
        shell: bash
        run: |
          for bin in udp2tcp tcp2udp; do
            OUT=$(file "target/${{ matrix.target }}/release/${bin}")
            echo "${bin}: ${OUT}"
            if echo "${OUT}" | grep -q "dynamically linked"; then
              echo "ERROR: ${bin} is dynamically linked — will not run on OpenWrt!"
              exit 1
            fi
          done

      - name: Strip binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          T="target/${{ matrix.target }}/release"
          if ${{ matrix.cross }}; then
            STRIP_CMD="llvm-strip"
          else
            STRIP_CMD="strip"
          fi
          ${STRIP_CMD} "${T}/udp2tcp" || strip "${T}/udp2tcp" || true
          ${STRIP_CMD} "${T}/tcp2udp" || strip "${T}/tcp2udp" || true
          ls -lh "${T}/udp2tcp" "${T}/tcp2udp"

      - name: Package binaries
        id: package
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          TAG="${{ github.ref_name }}"
          T="target/${TARGET}/release"
          LABEL=${{ matrix.openwrt && 'openwrt-' || '' }}

          if [[ "$TARGET" == *"windows"* ]]; then
            ARCHIVE="udp-over-tcp-${TAG}-${TARGET}.zip"
            7z a "$ARCHIVE" "${T}/udp2tcp.exe" "${T}/tcp2udp.exe"
          else
            ARCHIVE="udp-over-tcp-${TAG}-${LABEL}${TARGET}.tar.gz"
            tar czf "$ARCHIVE" -C "$T" udp2tcp tcp2udp
          fi

          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256" 2>/dev/null || \
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 90

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
